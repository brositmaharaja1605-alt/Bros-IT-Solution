<app-navbar></app-navbar>

<section class="section py-5" id="features">

<div class="container">

<div class="row justify-content-center">

<div class="col-lg-10">

<div class="text-center mb-5" data-aos="fade-up">

<span class="section-tag">
Platform
</span>

<h2 class="section-title">
One Platform,
<span>Everything Your Business Needs</span>
</h2>

<p class="section-desc mx-auto">
Billing, Inventory, CRM, Accounting, Reports, GST, Barcode,
Loyalty and Sales — all in one powerful cloud POS platform.
</p>

</div>

</div>

</div>

<div class="card border-0 rounded-4 shadow-lg overflow-hidden feature-wrapper">

<div class="row g-0">

<!-- LEFT -->

<div class="col-lg-3 sidebar-panel">

<div class="list-group list-group-flush">

<button
type="button"
class="list-group-item list-group-item-action d-flex align-items-center justify-content-between"

*ngFor="let c of categories;let i=index"

[class.active]="selectedCategory==i"

(mouseenter)="selectedCategory=i">

<span>

{{c.title}}

</span>

<i data-lucide="chevron-right"></i>

</button>

</div>

</div>

<!-- RIGHT -->

<div class="col-lg-9">

<div class="p-4 p-lg-5">

<div class="row g-4">

<div
class="col-12 col-md-6"

*ngFor="let m of categories[selectedCategory].modules;let i=index"

data-aos="fade-up"

[attr.data-aos-delay]="(i%6)*60">

<div class="module-card h-100">

<div class="card-body d-flex align-items-start">

<div class="module-icon flex-shrink-0">

<i [attr.data-lucide]="m[0]"></i>

</div>

<div class="flex-grow-1 ms-3">

<h5 class="module-title">

{{m[1]}}

</h5>

<p class="module-desc">

{{m[2]}}

</p>

</div>

<div class="module-arrow">

<i data-lucide="arrow-right"></i>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</div>

</section>
