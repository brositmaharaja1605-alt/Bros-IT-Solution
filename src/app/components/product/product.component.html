<app-navbar></app-navbar>

<section class="section py-5" id="features">

  <div class="container">

    <!-- Heading -->
    <div class="text-center mb-5" data-aos="fade-up">

      <h5 class="section-tag">Platform</h5>

      <h2 class="section-title">
        One Platform,
        <span>Everything Your Business Needs</span>
      </h2>

      <p class="section-desc mx-auto">
        Billing, Inventory, CRM, Accounting, Reports, GST, Barcode,
        Loyalty and Sales — all in one powerful cloud POS platform.
      </p>

    </div>

    <!-- Mega Menu -->
    <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

      <div class="row g-0">

        <!-- Left Menu -->
        <div class="col-lg-3 border-end sidebar-panel">

          <div class="list-group list-group-flush">

            <button
              type="button"
              class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 px-4 fw-semibold"
              *ngFor="let c of categories; let i=index"
              [class.active]="selectedCategory==i"
              (mouseenter)="selectedCategory=i">

              {{c.title}}

              <i data-lucide="chevron-right"></i>

            </button>

          </div>

        </div>

        <!-- Right Content -->
        <div class="col-lg-9">

          <div class="p-4">

            <div class="row g-4">

              <div
                class="col-md-6"
                *ngFor="let m of categories[selectedCategory].modules">

                <div
                  class="card h-100 border-0 shadow-sm rounded-4 module-card">

                  <div class="card-body d-flex">

                    <!-- Icon -->
                    <div class="module-icon me-3">

                      <i [attr.data-lucide]="m[0]"></i>

                    </div>

                    <!-- Text -->
                    <div class="flex-grow-1">

                      <!-- <h5 class="fw-bold mb-2">

                        {{m[1]}}

                      </h5> -->
                      <h5 class="fw-bold mb-2 module-title">
                          {{m[1]}}
                        </h5>
                        <p class="module-desc mb-0">
                          {{m[2]}}
                        </p>

                      <!-- <p class="text-muted mb-0">

                        {{m[2]}}

                      </p> -->

                    </div>

                    <!-- Arrow -->
                    <div
                      class="d-flex align-items-center text-primary ms-3">

                      <i data-lucide="arrow-right"></i>

                    </div>

                  </div>

                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</section>
