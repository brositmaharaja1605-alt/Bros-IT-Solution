
<app-navbar></app-navbar>


<section class="section" id="customers" style="background:var(--card);border-top:1px solid var(--border);border-bottom:1px solid var(--border);">
  <div class="container">
    <div class="text-center mb-5" data-aos="fade-up">
      <span class="eyebrow">Customers</span>
      <h2 class="section-title">Loved by retailers across India</h2>
    </div>
    <div class="d-flex align-items-center justify-content-center gap-4" data-aos="fade-up">
      <button class="testi-nav-btn d-none d-md-flex" aria-label="Previous testimonial" (click)="prevTesti()"><i data-lucide="chevron-left"></i></button>
      <div style="flex:1;max-width:760px;">
        <div class="testi-card">
          <img [src]="currentTesti.img" [alt]="currentTesti.name + ' avatar'" class="testi-avatar">
          <div class="testi-stars">★★★★★</div>
          <p class="testi-quote">"{{ currentTesti.text }}"</p>
          <div style="font-weight:700;">{{ currentTesti.name }}</div>
          <div style="font-size:.85rem;color:var(--text-3);">{{ currentTesti.role }}</div>
        </div>
      </div>
      <button class="testi-nav-btn d-none d-md-flex" aria-label="Next testimonial" (click)="nextTesti()"><i data-lucide="chevron-right"></i></button>
    </div>
    <div class="testi-dots">
      <button *ngFor="let t of testimonials; let i = index" [class.active]="i === testiIndex" [attr.aria-label]="'Go to testimonial ' + (i + 1)" (click)="goToTesti(i)"></button>
    </div>
  </div>
</section>
