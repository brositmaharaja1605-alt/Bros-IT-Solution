<a href="#main" class="skip-link">Skip to content</a>

<nav class="navbar-custom" [class.scrolled]="isScrolled">
  <div class="container-fluid container-xl d-flex align-items-center justify-content-between px-3 px-lg-4">
    <!-- Logo -->
    <a href="/" class="navbar-brand-custom" (click)="goHome($event)">
      <img src="assets/img/bros-logo.jpg" alt="Bros IT Solutions" class="logo-img">
      <span class="brand-text ">
        Bros <span class="dot">IT Solutions</span>
      </span>

    </a>

    <!-- Desktop Navigation -->
    <!-- <div class="nav-links d-none d-lg-flex">
      <a routerLink="/" fragment="about"(click)="navigateToSection('about',$event)">About</a>
      <a href="#features" [class.active-link]="activeFragment === 'features'" (click)="navigateToSection('features', $event)">Product</a>
      <a href="#industries" [class.active-link]="activeFragment === 'industries'" (click)="navigateToSection('industries', $event)">Industries</a>
      <a href="#customers" [class.active-link]="activeFragment === 'customers'" (click)="navigateToSection('customers', $event)">Customers</a>
      <a routerLink="/contact" routerLinkActive="active-link">Contact</a>
    </div> -->

    <!-- Desktop Navigation -->
    <div class="nav-links d-none d-lg-flex">

      <a routerLink="/" fragment="about" (click)="navigateToSection('about',$event)">
        About
      </a>

      <!-- Products Dropdown -->
      <div class="dropdown dropdown-products-container">
        <a class="dropdown-toggle nav-dropdown" href="#" role="button" (click)="toggleProductsDropdown($event)"
          [class.active-link]="productsDropdownOpen">
          Products
        </a>

        <div class="dropdown-menu mega-menu border-0 shadow-lg rounded-4 p-4" [class.show]="productsDropdownOpen">
          <div class="row g-3">
            <div class="col-lg-6" *ngFor="let p of dropdownProducts">
              <a [routerLink]="['/product']" [queryParams]="{ tab: p.tabIndex }" (click)="closeProductsDropdown()"
                class="product-dropdown-card d-flex align-items-start p-3">
                <div class="product-dropdown-icon-wrap me-3" [ngClass]="p.bgClass" [style.color]="p.color">
                  <i [class]="p.icon"></i>
                </div>
                <div class="product-info-text">
                  <h6 class="fw-bold mb-1 product-card-title">{{ p.title }}</h6>
                  <p class="mb-0 small product-card-desc">{{ p.desc }}</p>
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>

      <a href="#industries" [class.active-link]="activeFragment === 'industries'"
        (click)="navigateToSection('industries',$event)">
        Industries
      </a>

      <a href="#customers" [class.active-link]="activeFragment === 'customers'"
        (click)="navigateToSection('customers',$event)">
        Customers
      </a>

      <a routerLink="/contact" routerLinkActive="active-link">
        Contact
      </a>

    </div>

    <!-- Right Side Actions -->
    <!-- <div class="d-flex align-items-center gap-3">
      <button class="theme-toggle" aria-label="Toggle theme" (click)="toggleTheme()">
        <i [attr.class]="theme === 'dark' ? 'ri-sun-line' : 'ri-moon-line'"></i>
      </button>

      <button class="theme-toggle mobile-menu-btn d-lg-none" aria-label="Open menu" (click)="toggleMobileMenu()">
        <i class="ri-menu-line"></i>
      </button>
    </div> -->

    <div class="right-side">

      <button class="menu-btn d-lg-none" aria-label="Open menu" (click)="toggleMobileMenu()">
        <i class="ri-menu-3-line" [class.ri-close-line]="mobileMenuOpen"></i>
      </button>

    </div>
  </div>
</nav>

<!-- Mobile Navigation Drawer -->
<div class="mobile-nav d-lg-none dropdown-products-container " *ngIf="mobileMenuOpen" [class.show]="mobileMenuOpen">
  <div class="container d-flex flex-column gap-2">
    <a href="#about" [class.active-link]="activeFragment === 'about'"
      (click)="navigateToSection('about', $event)">About</a>

    <!-- Mobile Accordion for Products -->
    <div class="mobile-accordion-item">
      <button
        class="mobile-accordion-header w-100 text-start d-flex justify-content-between align-items-center py-2 px-3 border-0 bg-transparent"
        (click)="toggleProductsDropdown($event)" [class.active-link]="productsDropdownOpen">

        <span>Products</span>

        <i class="ri-arrow-down-s-line accordion-arrow" [class.rotated]="productsDropdownOpen">
        </i>

      </button>

      <div class="mobile-accordion-body" [class.expanded]="productsDropdownOpen">
        <div class="d-flex flex-column gap-2 ps-3 py-2">
          <a *ngFor="let p of dropdownProducts" [routerLink]="['/product']" [queryParams]="{ tab: p.tabIndex }"
            (click)="closeMobileMenu()"
            class="mobile-product-item d-flex align-items-center p-2 rounded text-decoration-none">
            <div class="product-dropdown-icon-wrap me-3" [ngClass]="p.bgClass" [style.color]="p.color"
              style="width: 36px; height: 36px; min-width: 36px; font-size: 18px; border-radius: 8px;">
              <i [class]="p.icon"></i>
            </div>
            <div>
              <div class="fw-semibold mobile-product-title">{{ p.title }}</div>
            </div>
          </a>
        </div>
      </div>
    </div>

    <a href="#industries" [class.active-link]="activeFragment === 'industries'"
      (click)="navigateToSection('industries', $event)">Industries</a>
    <a href="#customers" [class.active-link]="activeFragment === 'customers'"
      (click)="navigateToSection('customers', $event)">Customers</a>
    <a routerLink="/contact" routerLinkActive="active-link" (click)="closeMobileMenu()">Contact</a>
  </div>
</div>
